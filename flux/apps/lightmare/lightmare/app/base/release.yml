apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lightmare
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chartRef:
    kind: OCIRepository
    name: lightmare
    namespace: lightmare
  values:
    operator:
      octopus: true
      image:
        repository: "fluencelabs/lightmare"
        tag: "0.7.3@sha256:9d6384a536a9783bf81057780853f39befc6f7e354268ab631a677fa71f0264f"
      config:
        k8s:
          cni: "ovn"
          publicNetwork: "kube-system/public"
          privateVlanId: "${PRIVATE_VLAN_ID}"
        ccp:
          image:
            repository: "fluencelabs/ccp-cu-worker"
            tag: "0.17.0@sha256:e2704500147b4c385e1047728e8158c6e6614a519ab8c0bd27eae79aece8d2f1"
          memory: 2.48 gib
        chainAdapter:
          privateRPCTokenSecretRef: private-rpc-token-secret
          ipfsGatewayEndpoint: https://ipfs-gateway.fluence.dev
