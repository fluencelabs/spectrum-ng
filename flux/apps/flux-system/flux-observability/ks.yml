apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-observability
  namespace: flux-system
spec:
  path: ./flux/apps/flux-system/flux-observability/app
  prune: true
  targetNamespace: flux-system
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: prometheus-crds
    - name: grafana-operator-crd
