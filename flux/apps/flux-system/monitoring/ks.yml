apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-monitoring
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./flux/apps/flux-system/monitoring/app
  prune: true
  targetNamespace: flux-system
  sourceRef:
    kind: GitRepository
    name: spectrum
  dependsOn:
    - name: flux-operator
    - name: flux-spectrum
