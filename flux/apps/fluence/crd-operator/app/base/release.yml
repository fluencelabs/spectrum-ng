apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-operator
spec:
  interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: ./charts/crd-operator
      sourceRef:
        kind: GitRepository
        name: lightmare
        namespace: flux-system
      interval: 5m
  values:
    controller:
      config:
        LTM_CRD_CTRL__PUBLIC_NETWORK__ENABLED: "true"
        LTM_CRD_CTRL__PUBLIC_NETWORK__NAD_NAME: public
      persistence:
        enabled: true
        storageClassName: lvm-thin-r1
        accessModes:
          - ReadWriteOnce
        size: 1Gi

    api:
      config:
        LTM_CRD_API__STORAGE__NVME: "lvm-thin-r1"
        LTM_CRD_API__STORAGE__REPLICATED_NVME: "lvm-thin-r2"
