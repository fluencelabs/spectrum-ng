apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-operator
spec:
  interval: 5m
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
  driftDetection:
    mode: enabled
  values:
    controller:
      config:
        LTM_CRD_CTRL__PUBLIC_NETWORK__ENABLED: "true"
        LTM_CRD_CTRL__PUBLIC_NETWORK__NAD_NAME: public
        LTM_CRD_CTRL__VM_RUNTIME__DEFAULT_DNS_CONFIG__NAMESERVERS: '["1.1.1.1" ,"8.8.8.8"]'
        LTM_CRD_CTRL__VM_RUNTIME__DEFAULT_DNS_CONFIG__SEARCHES: '[]'
      persistence:
        enabled: true
        storageClassName: lvm-thin-r1
        accessModes:
          - ReadWriteOnce
        size: 1Gi

    api:
      config:
        LTM_CRD_API__STORAGE__NVME: "lvm-thin-r1"
        LTM_CRD_API__STORAGE__REPLICATED_NVME: "lvm-thin-r2"
