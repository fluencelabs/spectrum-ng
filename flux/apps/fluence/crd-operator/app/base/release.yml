apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-operator
spec:
  interval: 5m
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 5m
  driftDetection:
    mode: enabled
  values:
    controller:
      config:
        LTM__LOG_FORMAT: json
        LTM_CRD_CTRL__PUBLIC_NETWORK__ENABLED: "true"
        LTM_CRD_CTRL__PUBLIC_NETWORK__NAD_NAME: public
        LTM_CRD_CTRL__PUBLIC_NETWORK__SUBNETS: ${PUBLIC_SUBNET_LIST}
        LTM_CRD_CTRL__VM_RUNTIME__DEFAULT_DNS_CONFIG__NAMESERVERS: '["1.1.1.1" ,"8.8.8.8"]'
        LTM_CRD_CTRL__VM_RUNTIME__DEFAULT_DNS_CONFIG__SEARCHES: '[]'
      persistence:
        enabled: true
        accessModes:
          - ReadWriteOnce
        size: 1Gi

    api:
      config:
        LTM__LOG_FORMAT: json
        LTM_CRD_API__STORAGE__NVME: "lvm-thin-r1"
        LTM_CRD_API__STORAGE__REPLICATED_NVME: "lvm-thin-r2"

    admission:
      config:
        LTM__LOG_FORMAT: json

    vmApi:
      config:
        LTM__LOG_FORMAT: json
      jwt:
        # vodopad signs vm-access JWTs with `iss: "vodopad"`; vm-api validates
        # `iss` against this exact string. Same in every env (the per-env
        # bit lives in jwksUrl, which points at each env's vodopad JWKS).
        issuer: "vodopad"
