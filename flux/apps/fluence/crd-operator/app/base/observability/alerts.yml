apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: crd-operator-logs
  labels:
    rule-type: vlogs
spec:
  groups:
    - name: crd-controller-logs
      type: vlogs
      interval: "30s"
      params:
        query:
          - "container:controller AND namespace:fluence AND level:(ERROR OR WARN)"
      rules:
        - alert: CrdControllerErrorLogs
          expr: '* | stats by (level) count(*) as hits | filter hits:>0'
          for: 0s
          annotations:
            summary: "crd-controller {{ $labels.level }} logs detected"
            description: "crd-controller has {{ $value }} {{ $labels.level }} log entries in the last 30s"
          labels:
            severity: warning
    - name: crd-api-logs
      type: vlogs
      interval: "30s"
      params:
        query:
          - "container:api AND namespace:fluence AND level:(ERROR OR WARN)"
      rules:
        - alert: CrdApiErrorLogs
          expr: '* | stats by (level) count(*) as hits | filter hits:>0'
          for: 0s
          annotations:
            summary: "crd-api {{ $labels.level }} logs detected"
            description: "crd-api has {{ $value }} {{ $labels.level }} log entries in the last 30s"
          labels:
            severity: warning
    - name: crd-admission-logs
      type: vlogs
      interval: "30s"
      params:
        query:
          - "container:admission-controller AND namespace:fluence AND level:(ERROR OR WARN)"
      rules:
        - alert: CrdAdmissionErrorLogs
          expr: '* | stats by (level) count(*) as hits | filter hits:>0'
          for: 0s
          annotations:
            summary: "crd-admission {{ $labels.level }} logs detected"
            description: "crd-admission has {{ $value }} {{ $labels.level }} log entries in the last 30s"
          labels:
            severity: warning

    - name: cloudless.crd.ready.alerts
      rules:
        - alert: CloudlessWorkspaceNotReady
          expr: |
            kube_customresource_cloudless_workspace_condition{condition_type="Ready"} != 1
          for: 5m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "Workspace {{ $labels.name }} is not ready"
            description: "cloudless.dev Workspace {{ $labels.name }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 5 minutes"

        - alert: CloudlessVpcNotReady
          expr: |
            kube_customresource_cloudless_vpc_condition{condition_type="Ready"} != 1
          for: 5m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "Vpc {{ $labels.name }} (workspace={{ $labels.workspace }}) is not ready"
            description: "cloudless.dev Vpc {{ $labels.name }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 5 minutes"

        - alert: CloudlessSubnetNotReady
          expr: |
            kube_customresource_cloudless_subnet_condition{condition_type="Ready"} != 1
          for: 5m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "Subnet {{ $labels.name }} (workspace={{ $labels.workspace }}) is not ready"
            description: "cloudless.dev Subnet {{ $labels.name }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 5 minutes"

        - alert: CloudlessSecurityGroupNotReady
          expr: |
            kube_customresource_cloudless_securitygroup_condition{condition_type="Ready"} != 1
          for: 5m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "SecurityGroup {{ $labels.name }} (workspace={{ $labels.workspace }}) is not ready"
            description: "cloudless.dev SecurityGroup {{ $labels.name }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 5 minutes"

        - alert: CloudlessPublicIpNotReady
          expr: |
            kube_customresource_cloudless_publicip_condition{condition_type="Ready"} != 1
          for: 5m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "PublicIp {{ $labels.name }} (workspace={{ $labels.workspace }}) is not ready"
            description: "cloudless.dev PublicIp {{ $labels.name }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 5 minutes"

        - alert: CloudlessVirtualMachineNotReady
          expr: |
            kube_customresource_cloudless_vm_condition{condition_type="Ready"} != 1
          for: 10m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "VirtualMachine {{ $labels.vm_id }} (workspace={{ $labels.workspace_id }}) is not ready"
            description: "cloudless.dev VirtualMachine {{ $labels.vm_id }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 10 minutes"

        - alert: CloudlessStorageNotReady
          expr: |
            kube_customresource_cloudless_storage_condition{condition_type="Ready"} != 1
          for: 5m
          labels:
            team: devops
            severity: critical
          annotations:
            summary: "Storage {{ $labels.name }} (workspace={{ $labels.workspace }}) is not ready"
            description: "cloudless.dev Storage {{ $labels.name }} has Ready condition {{ $labels.condition_status }} (reason: {{ $labels.condition_reason }}) for more than 5 minutes"