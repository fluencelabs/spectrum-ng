apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: crd-operator-logs
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: Logs
  json: >
    {
      "title": "CRD Operator Logs",
      "uid": "crd-operator-logs",
      "tags": ["logs", "crd-operator"],
      "timezone": "browser",
      "refresh": "10s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "container",
            "type": "custom",
            "current": {"text": "All", "value": "$__all"},
            "options": [
              {"text": "All", "value": "controller OR api OR admission-controller"},
              {"text": "controller", "value": "controller"},
              {"text": "api", "value": "api"},
              {"text": "admission-controller", "value": "admission-controller"}
            ],
            "query": "controller,api,admission-controller",
            "includeAll": true,
            "allValue": "controller OR api OR admission-controller"
          },
          {
            "name": "level",
            "type": "custom",
            "current": {"text": "All", "value": "$__all"},
            "options": [
              {"text": "All", "value": "*"},
              {"text": "ERROR", "value": "ERROR"},
              {"text": "WARN", "value": "WARN"},
              {"text": "INFO", "value": "INFO"}
            ],
            "query": "ERROR,WARN,INFO",
            "includeAll": true,
            "allValue": "*"
          }
        ]
      },
      "panels": [
        {
          "title": "Log Volume",
          "type": "timeseries",
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0},
          "datasource": {"type": "victoriametrics-logs-datasource", "uid": "victoria-logs"},
          "targets": [
            {"expr": "namespace:fluence AND container:($container) | stats by (level) count(*) as hits", "refId": "A"}
          ],
          "fieldConfig": {
            "defaults": {"custom": {"drawStyle": "bars", "stacking": {"mode": "normal"}}},
            "overrides": [
              {"matcher": {"id": "byName", "options": "ERROR"}, "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]},
              {"matcher": {"id": "byName", "options": "WARN"}, "properties": [{"id": "color", "value": {"fixedColor": "yellow", "mode": "fixed"}}]},
              {"matcher": {"id": "byName", "options": "INFO"}, "properties": [{"id": "color", "value": {"fixedColor": "green", "mode": "fixed"}}]}
            ]
          }
        },
        {
          "title": "Error Logs",
          "type": "logs",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 6},
          "datasource": {"type": "victoriametrics-logs-datasource", "uid": "victoria-logs"},
          "targets": [
            {"expr": "namespace:fluence AND container:($container) AND level:ERROR", "refId": "A"}
          ],
          "options": {"showTime": true, "showLabels": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true}
        },
        {
          "title": "All Logs",
          "type": "logs",
          "gridPos": {"h": 14, "w": 24, "x": 0, "y": 14},
          "datasource": {"type": "victoriametrics-logs-datasource", "uid": "victoria-logs"},
          "targets": [
            {"expr": "namespace:fluence AND container:($container) AND level:($level)", "refId": "A"}
          ],
          "options": {"showTime": true, "showLabels": true, "wrapLogMessage": true, "sortOrder": "Descending", "enableLogDetails": true}
        }
      ],
      "schemaVersion": 39
    }
