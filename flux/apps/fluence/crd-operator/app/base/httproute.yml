apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
spec:
  hostnames: 
    - crd-api.${NETWORK}-${PROVIDER}.cloudless.dev
  parentRefs:
    - name: eg-gw
      namespace: ingress
      sectionName: https
  rules:
    - backendRefs:
        - name: api
          namespace: fluence
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
