apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crd-operator-api
spec:
  hostnames:
    - crd-api.${NETWORK}-${PROVIDER}.cloudless.dev
    - crd-api.${CLUSTER_ID}.${NETWORK}.cloudless.dev
  parentRefs:
    - name: eg-gw
      namespace: ingress
      sectionName: https
  rules:
    - backendRefs:
        - name: crd-operator-api
          namespace: fluence
          port: 8080
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: crd-operator-vm-console
spec:
  hostnames:
    - vm-console.${NETWORK}-${PROVIDER}.cloudless.dev
    - vm-console.${CLUSTER_ID}.${NETWORK}.cloudless.dev
  parentRefs:
    - name: eg-gw
      namespace: ingress
      sectionName: https
  rules:
    - backendRefs:
        - name: crd-operator-vm-console
          namespace: fluence
          port: 8444
      matches:
        - path:
            type: PathPrefix
            value: /
