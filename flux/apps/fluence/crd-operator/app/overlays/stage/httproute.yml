apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-open
spec:
  hostnames:
    - crd-api-open.stage-cloudless.cloudless.dev
  parentRefs:
    - name: eg-gw
      namespace: ingress
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: api
          port: 8080
          namespace: fluence
