apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crd-operator
spec:
  chart:
    spec:
      chart: ./charts/crd-operator
      sourceRef:
        kind: GitRepository
        name: lightmare
        namespace: fluence
      interval: 5m
  values:
    controller:
      config:
        LTM_CRD_CTRL__PUBLIC_NETWORK__SUBNETS: '["subnet-temp"]'

    api:
      config:
        LTM_CRD_API__STORAGE__NVME: "lvm-thin-r1"
        LTM_CRD_API__STORAGE__REPLICATED_NVME: "lvm-thin-r2"
