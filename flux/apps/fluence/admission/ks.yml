apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: fluence-admission
  namespace: flux-system
spec:
  path: ./kustomize/admission
  prune: false
  targetNamespace: fluence
  sourceRef:
    kind: GitRepository
    name: lightmare
    namespace: flux-system
  interval: 5m
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: fluence-crd
