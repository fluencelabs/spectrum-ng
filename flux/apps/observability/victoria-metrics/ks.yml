apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vm-stack
  namespace: flux-system
spec:
  path: ./flux/apps/observability/victoria-metrics/stack
  prune: false
  targetNamespace: observability
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: vm-operator
    - name: grafana-operator-crd
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vm-alertmanager
  namespace: flux-system
spec:
  path: ./flux/apps/observability/victoria-metrics/stack/alertmanager
  prune: false
  targetNamespace: observability
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: Secret
        name: spectrum-secrets
        optional: false
  dependsOn:
    - name: vm-stack
