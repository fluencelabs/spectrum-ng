apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: vm-stack
  namespace: flux-system
spec:
  path: ./flux/apps/observability/victoria-metrics/stack
  prune: false
  targetNamespace: observability
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spectrum-vars
        optional: false
      - kind: ConfigMap
        name: spectrum-manual-vars
        optional: true
  dependsOn:
    - name: vm-operator
    - name: grafana-operator-crd
