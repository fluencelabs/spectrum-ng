apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
spec:
  hostnames:
    - grafana.${CLUSTER_ID}.${NETWORK}.cloudless.dev
  parentRefs:
    - name: eg-gw
      namespace: ingress
      sectionName: https
  rules:
    - backendRefs:
        - name: grafana-service
          namespace: observability
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
