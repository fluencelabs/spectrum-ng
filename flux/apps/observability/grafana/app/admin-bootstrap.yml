# Gives Grafana a random admin password in-cluster (spectrum-ng has no Vault/ESO).
#
# grafana-operator's "default" admin-credentials secret is the static admin/admin, which Grafana 11.x
# then force-changes on first login. We set spec.disableDefaultAdminSecret on the CR and seed a random
# password here instead; the CR wires GF_SECURITY_ADMIN_USER/PASSWORD into the deployment from this
# secret. Grafana applies GF_SECURITY_ADMIN_PASSWORD at FIRST DB init, so on a fresh data dir the admin
# password becomes this random value (no forced change; the operator, which auths with this secret,
# matches). NOTE: the password is only adopted on a fresh grafana DB — if the PVC already holds an
# admin user, recreate it once (delete the grafana-pvc + pod) so first-init picks this up.
#
# Idempotent: generates a password only when the secret is missing or still the literal "admin".
# The password value never lives in git.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-admin-bootstrap
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-admin-bootstrap
  namespace: observability
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-admin-bootstrap
  namespace: observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-admin-bootstrap
subjects:
  - kind: ServiceAccount
    name: grafana-admin-bootstrap
    namespace: observability
---
apiVersion: batch/v1
kind: Job
metadata:
  # Versioned name: Job specs are immutable, bump the suffix when the script changes.
  name: grafana-admin-seed-1
  namespace: observability
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 180
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: grafana-admin-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: alpine/k8s:1.30.13
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /tmp
            - name: NS
              value: observability
            - name: SECRET
              value: grafana-admin-credentials
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              CUR=$(kubectl -n "$NS" get secret "$SECRET" \
                -o jsonpath='{.data.GF_SECURITY_ADMIN_PASSWORD}' 2>/dev/null | base64 -d || true)
              if [ -n "$CUR" ] && [ "$CUR" != "admin" ]; then
                echo "admin password already non-default; nothing to do"
                exit 0
              fi
              PW=$(LC_ALL=C tr -dc 'A-Za-z0-9' </dev/urandom | head -c 32)
              kubectl -n "$NS" create secret generic "$SECRET" \
                --from-literal=GF_SECURITY_ADMIN_USER=admin \
                --from-literal=GF_SECURITY_ADMIN_PASSWORD="$PW" \
                --dry-run=client -o yaml | kubectl -n "$NS" apply -f -
              echo "seeded random admin password (len ${#PW})"
