apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: "grafana"
spec:
  # Don't let the operator manage the admin-credentials secret — its default is the static admin/admin,
  # which Grafana 11.x then force-changes on first login. The grafana-admin-bootstrap Job seeds a
  # random password instead (see admin-bootstrap.yml); admin user/password are wired into the
  # deployment env below from that same secret.
  disableDefaultAdminSecret: true

  # grafana-operator (ns system) reaches this instance over the in-cluster Service DNS
  # https://grafana-service.observability.svc:3000 to fetch version + provision datasources/folders/
  # dashboards. The served leaf is valid only for the mesh name grafana.<id>.<net>.spectrum, and the
  # per-cluster mesh intermediate is name-constrained to *.<id>.<net>.spectrum — so the operator's
  # TLS verify fails (x509: not permitted by constraint) and NOTHING gets provisioned (Grafana shows
  # no logs/metrics while browser login via the mesh name still works). insecureSkipVerify scopes the
  # skip to this operator->Service hop only (pod-to-pod, one CNI); the served cert and the browser leg
  # are untouched. We do NOT widen the mesh CA name constraints (.svc is non-unique across clusters).
  client:
    tls:
      insecureSkipVerify: true
  service:
    spec:
      ports:
        - name: https
          port: 443
          targetPort: 3000
  config:
    server:
      # Per-cluster NetBird name; reached in-mesh via the spectrum coredns-custom zone
      # <CLUSTER_ID>.<NETWORK>.spectrum (CNAME -> grafana.networking.svc.cluster.local).
      # Native TLS: grafana serves https on :3000 with the grafana-internal-ca leaf cert, so the
      # browser opens https://grafana.<cluster_id>.<network>.spectrum directly (spectrum uses Envoy
      # Gateway, not nginx ingress). Operator laptops must trust the grafana-internal-ca root.
      protocol: "https"
      cert_file: "/etc/grafana-tls/tls.crt"
      cert_key: "/etc/grafana-tls/tls.key"
      root_url: "https://grafana.${CLUSTER_ID}.${NETWORK}.spectrum"
    log:
      mode: "console"
    users:
      allow_sign_up: "false"
      allow_org_create: "false"
    auth:
      # Keep the username/password form available for the break-glass admin. auto_login below still
      # redirects normal users straight to OIDC; disabling the form entirely would make the
      # break-glass account unreachable (?disableAutoLogin stops the redirect but does NOT bring the
      # hidden form back). Reach the form at /login?disableAutoLogin=true.
      disable_login_form: "false"
      disable_signout_menu: "false"
    auth.generic_oauth:
      enabled: "true"
      name: "Authentik"
      auto_login: "true"
      client_id: "${GRAFANA_OIDC_CLIENT_ID}"
      client_secret: "$__env{GF_OAUTH_CLIENT_SECRET}"
      scopes: "openid profile email groups"
      # ALL THREE legs now target the mesh-only authentik.infra — no dependency on the public edge.
      #   - auth_url (browser leg): the operator laptop resolves authentik.infra over NetBird.
      #   - token_url / api_url (server-side, from the Grafana pod): the pod is joined to the mesh by a
      #     NetBird sidecar that the netbird-operator (>=0.3.x) injects via the pod annotation
      #     `netbird.io/setup-key` (deployment below). The sidecar runs as root and rewrites the pod's
      #     shared /etc/resolv.conf, so the grafana container resolves authentik.infra and routes to it
      #     over the mesh — NO dnsConfig / hand-rolled sidecar needed. VALIDATED on the stage cluster
      #     2026-06-05 (getent + OIDC discovery 200; see authentik-infra-backchannel.md).
      # authentik.infra's leaf is signed DIRECTLY by the Fluence Mesh Root (infra Issuer
      # fluence-root-ca; chain leaf->root, no intermediate — confirmed issuer=CN=Fluence Mesh Root CA).
      # Grafana's server-side OAuth client must trust that root explicitly; mounted from the bootstrap
      # ConfigMap fluence-mesh-root-ca (public cert only; see deployment volumes).
      auth_url: "https://authentik.infra/application/o/authorize/"
      token_url: "https://authentik.infra/application/o/token/"
      api_url: "https://authentik.infra/application/o/userinfo/"
      tls_client_ca: "/etc/fluence-ca/root.crt"
      login_attribute_path: "preferred_username"
      email_attribute_path: "email"
      name_attribute_path: "name"
      role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-devs') && 'Editor' || 'Viewer'"
      allow_assign_grafana_admin: "true"
      use_pkce: "true"
    # No [security] admin_user/admin_password: grafana-operator auto-generates a random
    # admin password into the managed Secret `grafana-admin-credentials` (ns observability,
    # keys GF_SECURITY_ADMIN_USER/GF_SECURITY_ADMIN_PASSWORD). This is the break-glass account;
    # reach the login form at /login?disableAutoLogin=true (form kept by disable_login_form: false).
    analytics:
      check_for_updates: "false"
    news:
      news_feed_enabled: "false"

  # Persistent data dir so a pod restart doesn't wipe the operator-pushed datasources/dashboards.
  # grafana keeps them in sqlite under /var/lib/grafana; the operator default is an emptyDir, so every
  # pod recreate left Grafana blank until the operator re-pushed on its next resync. RWO volume → pair
  # with Recreate strategy below so a rollout releases the volume before the new pod attaches.
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: lvm-thin-r1

  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        metadata:
          annotations:
            # Trigger NetBird sidecar injection by the netbird-operator (>=0.3.x) mutating webhook.
            # The value is the NBSetupKey resource name (see netbird-setupkey.yml). The injected
            # `netbird` container joins the mesh and — running as root (see the securityContext split
            # below) — creates the WireGuard interface AND rewrites the pod's shared /etc/resolv.conf,
            # so the grafana container resolves & routes the mesh-only authentik.infra for the OIDC
            # token/userinfo back-channel. No dnsConfig and no hand-rolled sidecar.
            # We deliberately do NOT set netbird.io/init-sidecar: native-sidecar injection left the pod
            # stuck (Init / no sandbox) under kube-ovn here; a regular container works (grafana
            # re-reads resolv.conf once netbird is up, per glibc).
            netbird.io/setup-key: grafana
        spec:
          containers:
            - name: grafana
              # grafana now serves https on :3000, so the readiness probe must use HTTPS.
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /api/health
                  port: 3000
                  scheme: HTTPS
              # runAsUser/runAsGroup/runAsNonRoot live on THIS container, NOT pod-level: the
              # operator-injected netbird sidecar inherits pod-level securityContext, and it MUST run
              # as root (to create the WireGuard interface and write /etc/resolv.conf). A pod-level
              # runAsNonRoot/runAsUser:1001 made the sidecar crash (mkdir /var/log/netbird + bind
              # /var/run/netbird.sock: permission denied). Keeping it here leaves grafana as 1001 while
              # the sidecar runs root. PSA on observability is `privileged`, so root is permitted.
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                runAsGroup: 1001
                capabilities:
                  drop:
                  - ALL
              env:
                - name: GF_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc
                      key: client_secret
                # Admin creds wired explicitly because disableDefaultAdminSecret stops the operator
                # from injecting them. Seeded (random) by the grafana-admin-bootstrap Job.
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_PASSWORD
              volumeMounts:
                - name: grafana-tls
                  mountPath: /etc/grafana-tls
                  readOnly: true
                # Fluence Mesh Root (public cert) so the server-side OAuth client trusts
                # authentik.infra (tls_client_ca above). See volumes.fluence-ca.
                - name: fluence-ca
                  mountPath: /etc/fluence-ca
                  readOnly: true
                # Mount the PVC at grafana's data dir. spec.persistentVolumeClaim only CREATES the
                # claim (grafana-pvc); the operator does not auto-rewire the grafana-data volume, so
                # we override it below from the default emptyDir to the PVC.
                - name: grafana-data
                  mountPath: /var/lib/grafana
          volumes:
            - name: grafana-tls
              secret:
                secretName: grafana-spectrum-tls
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
            # Fluence Mesh Root (public CA cert only — no key) for tls_client_ca. Bootstrap ConfigMap,
            # hand-delivered like the fluence-mesh-intermediate secret (the root key never leaves
            # infrahub; the cert is public). Key `root.crt`.
            - name: fluence-ca
              configMap:
                name: fluence-mesh-root-ca
          securityContext:
            # Only fsGroup at pod level (RWO PVC group ownership). runAsUser/runAsGroup/runAsNonRoot
            # are set on the grafana CONTAINER instead, so the operator-injected netbird sidecar (which
            # inherits pod-level securityContext) is free to run as root — required for WireGuard + the
            # /etc/resolv.conf rewrite.
            fsGroup: 1001
