apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: "grafana"
spec:
  service:
    spec:
      ports:
        - name: http
          port: 80
          targetPort: 3000
  config:
    server:
      # Per-cluster NetBird name (multiple spectrum clusters → the svc-FQDN collides). Reachable via
      # the spectrum coredns-custom zone <CLUSTER_ID>.<NETWORK>.spectrum -> *.networking.svc.cluster.local.
      # Confirmed: grafana.<cluster_id>.<network>.spectrum resolves + /api/health 200.
      root_url: "http://grafana.${CLUSTER_ID}.${NETWORK}.spectrum"
    log:
      mode: "console"
    users:
      allow_sign_up: "false"
      allow_org_create: "false"
    auth:
      disable_login_form: "true"
      disable_signout_menu: "false"
    auth.generic_oauth:
      enabled: "true"
      name: "Authentik"
      auto_login: "true"
      client_id: "${GRAFANA_OIDC_CLIENT_ID}"
      client_secret: "$__env{GF_OAUTH_CLIENT_SECRET}"
      scopes: "openid profile email groups"
      # Browser leg over the internal NetBird host (private CA) to bypass the public Cloudflare/QUIC
      # edge ([[Authentik HTTP3 Flakiness]]). Operator laptops must trust the authentik-internal-ca
      # root. token/api are server-side from the Grafana pod and stay on the public host (curl is
      # unaffected by the QUIC bug; the pod can't resolve the infrahub svc-FQDN cross-cluster).
      auth_url: "https://authentik-fluence.networking.svc.cluster.local/application/o/authorize/"
      token_url: "https://authentik.cloudless.dev/application/o/token/"
      api_url: "https://authentik.cloudless.dev/application/o/userinfo/"
      login_attribute_path: "preferred_username"
      email_attribute_path: "email"
      name_attribute_path: "name"
      role_attribute_path: "contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-devs') && 'Editor' || 'Viewer'"
      allow_assign_grafana_admin: "true"
      use_pkce: "true"
    # No [security] admin_user/admin_password: grafana-operator auto-generates a random
    # admin password into the managed Secret `grafana-admin-credentials` (ns observability,
    # keys GF_SECURITY_ADMIN_USER/GF_SECURITY_ADMIN_PASSWORD). This is the break-glass account
    # (login form hidden by auto_login; reach it via /login?disableAutoLogin).
    analytics:
      check_for_updates: "false"
    news:
      news_feed_enabled: "false"

  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              readinessProbe:
                failureThreshold: 3
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                  - ALL
              env:
                - name: GF_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc
                      key: client_secret
          securityContext:
            fsGroup: 1001
            runAsGroup: 1001
            runAsNonRoot: true
            runAsUser: 1001
