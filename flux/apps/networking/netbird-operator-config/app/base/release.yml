apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator-config
spec:
  interval: 1h
  chart:
    spec:
      chart: netbird-operator-config
      version: 0.1.0
      sourceRef:
        kind: HelmRepository
        name: netbirdio
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    cluster:
      name: "spectrum-${NETWORK}-${CLUSTER_ID}"
      dns: svc.cluster.local
    namespacedNetworks: false
    router:
      enabled: true
    kubernetesAPI:
      enabled: false
