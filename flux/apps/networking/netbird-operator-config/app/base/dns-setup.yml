apiVersion: batch/v1
kind: Job
metadata:
  name: netbird-dns-setup
  namespace: networking
  annotations:
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
        - name: dns-setup
          image: python:3-alpine
          command: ["python3", "-c"]
          args:
            - |
              import json, os, urllib.request, ssl

              API_URL = "https://netbird.infrahub.cloudless.dev/api"
              TOKEN = os.environ["NB_API_KEY"]
              CLUSTER_ID = os.environ["CLUSTER_ID"]
              NETWORK = os.environ["NETWORK"]

              ctx = ssl.create_default_context()

              def api(method, path, data=None):
                  body = json.dumps(data).encode() if data else None
                  req = urllib.request.Request(
                      f"{API_URL}/{path}",
                      data=body,
                      method=method,
                      headers={
                          "Authorization": f"Token {TOKEN}",
                          "Content-Type": "application/json",
                      },
                  )
                  with urllib.request.urlopen(req, context=ctx) as resp:
                      return json.loads(resp.read())

              # Auto-detect CoreDNS IP
              import socket
              try:
                  coredns_ip = socket.gethostbyname("kube-dns.kube-system.svc.cluster.local")
              except socket.gaierror:
                  raise SystemExit("Error: could not detect CoreDNS IP")
              print(f"Detected CoreDNS IP: {coredns_ip}")

              ns_name = f"spectrum-{CLUSTER_ID}-{NETWORK}-dns"

              # Check if nameserver group already exists
              nameservers = api("GET", "dns/nameservers")
              if any(ns["name"] == ns_name for ns in nameservers):
                  print("Nameserver group already exists, skipping")
                  raise SystemExit(0)

              # Get support group ID
              groups = api("GET", "groups")
              support = next((g for g in groups if g["name"] == "support"), None)
              if not support:
                  raise SystemExit("Error: support group not found")
              print(f"Found support group: {support['id']}")

              # Create nameserver group
              result = api("POST", "dns/nameservers", {
                  "name": ns_name,
                  "description": f"DNS for spectrum {NETWORK} cluster {CLUSTER_ID}",
                  "nameservers": [{
                      "ip": coredns_ip,
                      "ns_type": "udp",
                      "port": 53,
                  }],
                  "enabled": True,
                  "groups": [support["id"]],
                  "primary": False,
                  "domains": [f"{CLUSTER_ID}.{NETWORK}.fluence.nb"],
                  "search_domains_enabled": True,
              })
              print(f"Nameserver group created: {result.get('id', 'ok')}")
          env:
            - name: NB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-api-token
                  key: NB_API_KEY
            - name: CLUSTER_ID
              value: "${CLUSTER_ID}"
            - name: NETWORK
              value: "${NETWORK}"
      restartPolicy: Never
