apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: netbird-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: kubernetes-operator
      version: 0.2.2
      sourceRef:
        kind: HelmRepository
        name: netbirdio
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    fullnameOverride: netbird-operator
    managementURL: "https://netbird.infrahub.cloudless.dev"
    cluster:
      name: "spectrum-${NETWORK}-${CLUSTER_ID}"
    netbirdAPI:
      keyFromSecret:
        name: netbird-api-token
        key: NB_API_KEY
