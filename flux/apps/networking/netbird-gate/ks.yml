apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird-gate
  namespace: flux-system
spec:
  path: ./flux/apps/networking/netbird-gate/app
  prune: false
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 5m
  retryInterval: 1m
  timeout: 5m
  targetNamespace: flux-system
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: netbird-credentials
      namespace: flux-system
