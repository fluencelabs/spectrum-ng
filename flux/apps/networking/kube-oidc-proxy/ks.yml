apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-oidc-proxy
  namespace: flux-system
spec:
  path: ./flux/apps/networking/kube-oidc-proxy/app
  prune: true
  targetNamespace: kube-oidc-proxy
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: spectrum-vars
        optional: false
      - kind: ConfigMap
        name: spectrum-manual-vars
        optional: true
      - kind: Secret
        name: spectrum-manual-secrets
        optional: true
  dependsOn:
    - name: cert-manager
    # netbird-operator (>=0.3.x) provides the SetupKey CRD + the sidecar-injection webhook the pod
    # annotation relies on (netbird-setupkey.yml / deployment.yml). Ensures both exist before reconcile.
    - name: netbird-operator
