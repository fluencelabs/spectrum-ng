apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-oidc-proxy
  namespace: kube-oidc-proxy
---
# The proxy authenticates to the real apiserver as this SA, then sets impersonation headers from the
# validated OIDC token. Blast radius is narrowed two ways: (1) users impersonate is unscoped (per-user
# names can't be allowlisted) but the oidc: username prefix makes a system:* username impossible;
# (2) groups impersonate is restricted by resourceNames to exactly the bound groups PLUS
# system:authenticated (kube-oidc-proxy always appends system:authenticated to the impersonated
# groups — omitting it Forbids every request). No userextras grant: the proxy emits no extras with
# this flag set (no --extra-user-header-client-ip). serviceaccounts impersonate is deliberately NOT
# granted. NOTE: the resourceNames list is coupled to deployment.yml's --oidc-groups-prefix and
# rbac-users.yml's subjects — adding a tier means updating all three.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-oidc-proxy
rules:
  - apiGroups: [""]
    resources: ["users"]
    verbs: ["impersonate"]
  - apiGroups: [""]
    resources: ["groups"]
    verbs: ["impersonate"]
    resourceNames: ["oidc:k8s-admins", "oidc:k8s-viewers", "system:authenticated"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-oidc-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-oidc-proxy
subjects:
  - kind: ServiceAccount
    name: kube-oidc-proxy
    namespace: kube-oidc-proxy
