apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-oidc-proxy
  namespace: kube-oidc-proxy
---
# The proxy authenticates to the real apiserver as this SA, then sets impersonation headers from the
# validated OIDC token. The proxy passes through EVERY group in the token (prefixed `oidc:`), and a
# real user has many Authentik groups (devops, grafana-admins, vault-admins, …) — so the groups
# impersonate verb is UNRESTRICTED (a resourceNames allowlist would 403 the whole request the moment
# the token carries any group not on the list). Safety comes from `--oidc-username-prefix=oidc:` /
# `--oidc-groups-prefix=oidc:`: every impersonated user/group is namespaced under `oidc:`, so a token
# can never impersonate `system:masters` or any privileged `system:*` identity. Only `oidc:devops`
# (→cluster-admin) and `oidc:dev` (→view) have RBAC bindings; all other `oidc:*` groups grant nothing.
# serviceaccounts impersonate is deliberately NOT granted.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-oidc-proxy
rules:
  - apiGroups: [""]
    resources: ["users", "groups"]
    verbs: ["impersonate"]
  # The proxy forwards token user-extras as Impersonate-Extra-* headers; the apiserver requires the SA
  # to be authorized for each. Modern OIDC tokens carry `authentication.kubernetes.io/credential-id`
  # (the token JTI, for audit) — without this grant every request 403s ("Forbidden"). Value is
  # per-token, so it is left unrestricted (the key, not the value, is what matters).
  - apiGroups: ["authentication.k8s.io"]
    resources: ["userextras/authentication.kubernetes.io/credential-id"]
    verbs: ["impersonate"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-oidc-proxy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-oidc-proxy
subjects:
  - kind: ServiceAccount
    name: kube-oidc-proxy
    namespace: kube-oidc-proxy
