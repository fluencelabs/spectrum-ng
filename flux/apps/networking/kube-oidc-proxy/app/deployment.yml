apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-oidc-proxy
  namespace: kube-oidc-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-oidc-proxy
  template:
    metadata:
      labels:
        app: kube-oidc-proxy
      annotations:
        # Trigger NetBird sidecar injection by the netbird-operator (>=0.3.x) mutating webhook. The
        # value is the NBSetupKey resource name (see netbird-setupkey.yml). The injected `netbird`
        # container joins the mesh and — running as root — creates the WireGuard interface AND rewrites
        # the pod's shared /etc/resolv.conf, so the proxy container resolves & routes the mesh-only
        # authentik.infra for OIDC discovery/JWKS. No dnsConfig and no hand-rolled sidecar. Mirrors the
        # Grafana OIDC back-channel (PR #142, validated on stage 2026-06-05).
        # We deliberately do NOT set netbird.io/init-sidecar: native-sidecar injection left the pod
        # stuck (Init / no sandbox) under kube-ovn; a regular container works (the proxy re-reads
        # resolv.conf once netbird is up, per glibc).
        netbird.io/setup-key: kube-oidc-proxy
    spec:
      serviceAccountName: kube-oidc-proxy
      # No pod-level securityContext: the operator-injected netbird sidecar inherits pod-level context
      # and MUST run as root (WireGuard + /etc/resolv.conf rewrite). Hardening is set on the proxy
      # CONTAINER below instead. PSA on this namespace is `privileged` (see namespace.yml).
      containers:
        - name: proxy
          # jetstack repo archived 2024-05; this is the last published tag and is what the Tremolo
          # maintained fork's Helm chart still defaults to. Pinned by digest (tag v0.3.0).
          image: quay.io/jetstack/kube-oidc-proxy:v0.3.0@sha256:e045b26eb6dfb176310b38e30a66c2c4ffc0c1a75a1c60fa3ccf63bfbf2393a7
          command: ["kube-oidc-proxy"]
          args:
            - "--secure-port=443"
            - "--tls-cert-file=/etc/oidc/tls/tls.crt"
            - "--tls-private-key-file=/etc/oidc/tls/tls.key"
            # Mesh-only authentik.infra (no public edge / QUIC). The operator-injected netbird sidecar
            # gives this pod mesh reachability for discovery/JWKS. KUBE_OIDC_SLUG defaults to "kube";
            # KUBE_OIDC_CLIENT_ID has no safe default and MUST be set in spectrum-manual-vars (Flux
            # blanks undefined vars -> empty client-id breaks OIDC).
            - "--oidc-issuer-url=https://authentik.infra/application/o/${KUBE_OIDC_SLUG:=kube}/"
            - "--oidc-client-id=${KUBE_OIDC_CLIENT_ID}"
            - "--oidc-username-claim=preferred_username"
            - "--oidc-groups-claim=groups"
            # Prefix every OIDC identity so a token can NEVER land on a privileged system:* name
            # (e.g. an Authentik group literally named "system:masters"). v0.3.0 does NOT guard this
            # itself. Coupled with rbac-users.yml subjects (oidc:k8s-admins/oidc:k8s-viewers) and the
            # groups resourceNames allowlist in rbac-proxy.yml — all three MUST change together.
            - "--oidc-username-prefix=oidc:"
            - "--oidc-groups-prefix=oidc:"
            # authentik.infra's leaf is signed DIRECTLY by the Fluence Mesh Root (no intermediate).
            # Trust it via the ca.crt of the fluence-mesh-intermediate bootstrap secret (which IS the
            # self-signed CN=Fluence Mesh Root CA) — same source Grafana uses for tls_client_ca. Reuses
            # an already-required secret instead of a second hand-delivered object.
            - "--oidc-ca-file=/etc/fluence-ca/root.crt"
          ports:
            - name: https
              containerPort: 443
            - name: probe
              containerPort: 8080
          # /ready calls AuthenticateToken and stays 503 until OIDC discovery (via the injected mesh
          # sidecar) succeeds, then latches ready=true. readiness alone removes the pod from endpoints
          # during a transient authentik.infra outage and self-heals. A startupProbe gives the mesh +
          # OIDC a generous cold-start budget. No livenessProbe on /ready: a restart would reset the
          # in-process discovery retry and the warm sidecar mesh — counterproductive (upstream ships
          # readiness-only for this reason).
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          # Hardening lives on this container (NOT pod-level) so the injected netbird sidecar can run
          # as root. PSA `privileged` on the namespace permits the sidecar; the proxy stays locked down.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tls
              mountPath: /etc/oidc/tls
              readOnly: true
            - name: fluence-ca
              mountPath: /etc/fluence-ca
              readOnly: true
      volumes:
        - name: tls
          secret:
            secretName: kube-oidc-proxy-tls
        - name: fluence-ca
          # Fluence Mesh Root (public CA cert) to verify authentik.infra's served leaf. Sourced from
          # the ca.crt of the fluence-mesh-intermediate bootstrap secret (already required on every
          # cluster; its ca.crt IS the self-signed CN=Fluence Mesh Root CA). Projected to root.crt to
          # match --oidc-ca-file. Reusing it avoids a second hand-delivered object (a missing standalone
          # configmap wedged the grafana pod in ContainerCreating — 8h outage on stage 2026-06-05).
          secret:
            secretName: fluence-mesh-intermediate
            items:
              - key: ca.crt
                path: root.crt
