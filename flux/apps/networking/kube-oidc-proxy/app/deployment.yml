apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-oidc-proxy
  namespace: kube-oidc-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-oidc-proxy
  template:
    metadata:
      labels:
        app: kube-oidc-proxy
    spec:
      serviceAccountName: kube-oidc-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          # jetstack repo archived 2024-05; this is the last published tag and is what the Tremolo
          # maintained fork's Helm chart still defaults to. Pinned by digest (tag v0.3.0).
          image: quay.io/jetstack/kube-oidc-proxy:v0.3.0@sha256:e045b26eb6dfb176310b38e30a66c2c4ffc0c1a75a1c60fa3ccf63bfbf2393a7
          command: ["kube-oidc-proxy"]
          args:
            - "--secure-port=443"
            - "--tls-cert-file=/etc/oidc/tls/tls.crt"
            - "--tls-private-key-file=/etc/oidc/tls/tls.key"
            # Browser + token legs go to the mesh-only host authentik.infra (no QUIC edge bug);
            # the netbird sidecar gives this pod mesh reachability to fetch discovery/JWKS.
            # KUBE_OIDC_SLUG defaults to "kube"; KUBE_OIDC_CLIENT_ID has no safe default and MUST be
            # set in spectrum-manual-vars (Flux blanks undefined vars -> empty client-id breaks OIDC).
            - "--oidc-issuer-url=https://authentik.infra/application/o/${KUBE_OIDC_SLUG:=kube}/"
            - "--oidc-client-id=${KUBE_OIDC_CLIENT_ID}"
            - "--oidc-username-claim=preferred_username"
            - "--oidc-groups-claim=groups"
            # Prefix every OIDC identity so a token can NEVER land on a privileged system:* name
            # (e.g. an Authentik group literally named "system:masters"). v0.3.0 does NOT guard this
            # itself. Coupled with rbac-users.yml subjects (oidc:k8s-admins/oidc:k8s-viewers) and the
            # groups resourceNames allowlist in rbac-proxy.yml — all three MUST change together.
            - "--oidc-username-prefix=oidc:"
            - "--oidc-groups-prefix=oidc:"
            # authentik.infra serves a Fluence-chain cert; trust the mesh root mounted below.
            - "--oidc-ca-file=/etc/oidc/authentik-ca/ca.crt"
          ports:
            - name: https
              containerPort: 443
            - name: probe
              containerPort: 8080
          # /ready calls AuthenticateToken and stays 503 until OIDC discovery (via the sidecar mesh)
          # succeeds, then latches ready=true. readiness alone removes the pod from endpoints during a
          # transient authentik.infra outage and self-heals. A startupProbe gives the mesh+OIDC a
          # generous cold-start budget. No livenessProbe on /ready: a restart would reset the
          # in-process discovery retry and the warm sidecar mesh — counterproductive (upstream ships
          # readiness-only for this reason).
          startupProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tls
              mountPath: /etc/oidc/tls
              readOnly: true
            - name: authentik-ca
              mountPath: /etc/oidc/authentik-ca
              readOnly: true
        # Sidecar: joins the NetBird mesh (group spectrum-${NETWORK}) so the proxy container — which
        # shares this pod's network namespace — can resolve and reach authentik.infra for OIDC
        # discovery/JWKS. NetBird needs root + NET_ADMIN + /dev/net/tun for its WireGuard interface,
        # so it overrides the hardened pod-level securityContext for this container only.
        - name: netbird
          image: netbirdio/netbird:0.28.4
          env:
            - name: NB_MANAGEMENT_URL
              value: "https://netbird.infrahub.cloudless.dev"
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: kube-oidc-proxy-netbird-setupkey
                  key: NB_SETUP_KEY
            - name: NB_HOSTNAME
              value: "kube-oidc-proxy-${CLUSTER_ID}"
            # NetBird's embedded DNS resolver listen address. NOTE: the cross-container DNS wiring
            # (how the proxy container resolves authentik.infra via this resolver) is the one item
            # pending an in-cluster decision — see docs/.../specs §8 open item. Do not treat the
            # dnsConfig below as validated.
            - name: NB_DNS_RESOLVER_ADDRESS
              value: "127.0.0.1:5353"
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: nb-tun
              mountPath: /dev/net/tun
            - name: nb-state
              mountPath: /var/lib/netbird
      # PENDING in-cluster decision (see specs §8): this dnsConfig is not yet validated.
      dnsPolicy: ClusterFirst
      dnsConfig:
        nameservers:
          - 127.0.0.1
        options:
          - name: ndots
            value: "1"
      volumes:
        - name: tls
          secret:
            secretName: kube-oidc-proxy-tls
        - name: authentik-ca
          # Bootstrap secret: the Fluence Mesh Root used to verify authentik.infra's served cert.
          # Hand-delivered into this namespace (key: ca.crt). See docs/kube-oidc-proxy-access.md.
          secret:
            secretName: kube-oidc-proxy-authentik-ca
        - name: nb-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
        - name: nb-state
          emptyDir: {}
