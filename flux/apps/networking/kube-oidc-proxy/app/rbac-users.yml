# Authentik group -> cluster access. Groups arrive as Impersonate-Group headers from the OIDC
# `groups` claim, prefixed with "oidc:" by the proxy (--oidc-groups-prefix). The subject names below
# MUST carry that prefix and MUST match the resourceNames allowlist in rbac-proxy.yml. cluster-admin
# and view are built-in ClusterRoles. To add an editor tier: bind built-in `edit` to oidc:k8s-editors
# AND add oidc:k8s-editors to the rbac-proxy.yml groups resourceNames.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-admins
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: oidc:k8s-admins
    apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-viewers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: Group
    name: oidc:k8s-viewers
    apiGroup: rbac.authorization.k8s.io
