# Publishes grafana under its per-cluster mesh name grafana.<cluster_id>.<network>.spectrum as a
# netbird DIRECT resource (exact-match DNS), instead of relying on the flaky netbird
# nameserver-forward to coredns. The operator can't do this from the Service annotation (it always
# builds the address as <svc>.<ns>.svc.cluster.local), and the netbird network ID is generated
# per-cluster, so we can't hardcode it. This Job reads the network ID from the NBRoutingPeer the
# operator already manages, then applies an NBResource with the .spectrum address — the operator
# then creates the netbird resource. The routing peer resolves the .spectrum address in-cluster via
# the coredns-custom zone (reliable), so peers get the name without the over-mesh DNS forward.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-nbresource-setup
  namespace: networking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-nbresource-setup
  namespace: networking
rules:
  - apiGroups: ["netbird.io"]
    resources: ["nbroutingpeers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["netbird.io"]
    resources: ["nbresources"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-nbresource-setup
  namespace: networking
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-nbresource-setup
subjects:
  - kind: ServiceAccount
    name: grafana-nbresource-setup
    namespace: networking
---
apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-nbresource-setup
  namespace: networking
  annotations:
    # A Job pod template is immutable; let Flux recreate it on spec changes.
    kustomize.toolkit.fluxcd.io/force: "Enabled"
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: grafana-nbresource-setup
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: setup
          image: alpine/k8s:1.30.13
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: HOME
              value: /tmp
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              # Wait for the operator-managed routing peer to publish the network ID.
              NETID=""
              for i in $(seq 1 30); do
                NETID=$(kubectl -n networking get nbroutingpeer router -o jsonpath='{.status.networkID}' 2>/dev/null || true)
                [ -n "$${NETID}" ] && break
                echo "waiting for NBRoutingPeer networkID... ($i/30)"
                sleep 10
              done
              [ -n "$${NETID}" ] || { echo "ERROR: NBRoutingPeer networkID not found"; exit 1; }
              echo "networkID=$${NETID}"

              cat <<EOF | kubectl apply -f -
              apiVersion: netbird.io/v1
              kind: NBResource
              metadata:
                name: grafana-spectrum
                namespace: networking
              spec:
                name: grafana-spectrum.${CLUSTER_ID}.${NETWORK}
                address: grafana.${CLUSTER_ID}.${NETWORK}.spectrum
                networkID: $${NETID}
                groups:
                  - spectrum-${NETWORK}
                tcpPorts:
                  - 443
              EOF
              echo "applied NBResource grafana-spectrum -> grafana.${CLUSTER_ID}.${NETWORK}.spectrum"
