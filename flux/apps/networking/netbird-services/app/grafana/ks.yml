apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: netbird-services-grafana
  namespace: flux-system
spec:
  path: ./flux/apps/networking/netbird-services/app/grafana
  prune: true
  targetNamespace: networking
  sourceRef:
    kind: GitRepository
    name: spectrum
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  dependsOn:
    - name: netbird-operator-config
    - name: grafana
