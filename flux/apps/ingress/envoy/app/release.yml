apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 5m
  driftDetection:
    mode: enabled
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: flux-system
  values:
    config:
      envoyGateway:
        extensionApis:
          enableEnvoyPatchPolicy: true
          enableBackend: true
