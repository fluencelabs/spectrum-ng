# NetBird operator chart source.
#
# 0.4.0+ moved off the classic HelmRepository (netbirdio.github.io/helms, which stopped at 0.3.1)
# to an OCI registry on GHCR and renamed the chart kubernetes-operator -> netbird-operator. The old
# companion chart `netbird-operator-config` was NOT republished here; its routing-peer CR is now
# inlined under flux/apps/networking/netbird-operator-config/app/base (the operator still reconciles
# the legacy netbird.io/v1 NBRoutingPeer/NBResource/NBPolicy/NBGroup kinds). Public, anonymous pull.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: netbirdio
  namespace: flux-system
spec:
  type: oci
  interval: 1h
  url: oci://ghcr.io/netbirdio/helm-charts
